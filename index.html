<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shab e Ashur Route</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <img class="logo" src="1B213D43-4A2B-4A6D-B674-727F8C79F8D0.png" alt="Pasban-e-Aza Logo" />
    <h1>Shab e Ashur</h1>
    <div class="subtitle">Live Route Tracker</div>

    <section class="status-bar">
      <div class="now-label">Current Status</div>
      <div id="now-title" class="now-title">Loading live status...</div>
      <div class="progress-wrap"><div id="progress-fill" class="progress-fill"></div></div>
      <div id="progress-text" class="progress-text">0 / 11 stops completed</div>
    </section>

    <section class="map-card">
      <div class="map-header">
        <div>
          <div class="now-label">Current Route</div>
          <div id="map-route-title" class="map-route-title">Loading route...</div>
        </div>
        <a id="map-open-link" class="map-open-link" href="#" target="_blank" rel="noopener noreferrer">Open</a>
      </div>
      <iframe id="route-map" class="route-map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <div class="map-note">Map only shows the current majlis to the next majlis.</div>
    </section>

    <section id="route-list" class="list"></section>

    <a id="route-button" class="route-btn" href="#" target="_blank" rel="noopener noreferrer">Open Full Route in Google Maps</a>
    <div class="footer">Tap any address to open that stop in Google Maps.</div>
    <div class="footer"><a href="https://www.pasbaneaza.org">Anjuman Pasban e Aza</a></div>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
